<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | MAXIMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --marble: #f4f1ea; --deep: #1a1714; }
        body { margin: 0; background: #e0ded9; color: #1a1a1a; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* FOYER */
        #foyer-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: linear-gradient(135deg, #fff 0%, #f4f1ea 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
        }
        #foyer-overlay.hidden { opacity: 0; pointer-events: none; transform: translateY(-100%); }

        /* FIXED MINI-MAP */
        #map-container { 
            position: absolute; bottom: 30px; left: 30px; width: 160px; height: 160px; 
            border: 3px solid var(--gold); background: rgba(255,255,255,0.9); 
            z-index: 100; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        #player-marker { 
            position: absolute; width: 10px; height: 10px; background: #ff4444; 
            border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #fff;
        }

        /* ART INFO */
        #plaque { 
            position: absolute; bottom: 40px; right: 40px; 
            background: #fff; padding: 30px; width: 400px; 
            display: none; border-left: 10px solid var(--gold); 
            box-shadow: 0 50px 100px rgba(0,0,0,0.3); z-index: 150;
        }

        .btn-enter { background: var(--deep); color: var(--gold); border: none; padding: 20px 50px; cursor: pointer; font-size: 18px; font-weight: 700; margin-top: 20px; transition: 0.3s; }
        .btn-enter:hover { letter-spacing: 2px; background: #000; }
    </style>
</head>
<body>

    <div id="foyer-overlay">
        <h1 style="font-family:'Playfair Display'; font-size: 72px; color: var(--deep); margin: 0;">THE GRAND ESTATE</h1>
        <p style="letter-spacing: 8px; color: var(--gold); font-weight: 600;">MAXIMA EDITION</p>
        <button class="btn-enter" onclick="startExperience()">ENTER THE ARCHIVE</button>
    </div>

    <div id="map-container"><div id="player-marker"></div></div>

    <div id="plaque">
        <h2 id="artist" style="margin:0; font-family:'Playfair Display';"></h2>
        <p id="title" style="font-style:italic; color:#666;"></p>
        <button onclick="exitFocus()" style="width:100%; margin-top:20px; padding:10px; background:var(--gold); border:none; cursor:pointer; font-weight:bold;">[E] RESUME WALK</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f1ea);
        scene.fog = new THREE.Fog(0xf4f1ea, 5, 50);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xfff5e6, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- ROOM DESIGN ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 10), wallMat);
        leftWall.position.set(-10, 5, -400); leftWall.rotation.y = Math.PI/2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 10), wallMat);
        rightWall.position.set(10, 5, -400); rightWall.rotation.y = -Math.PI/2;
        scene.add(rightWall);

        // --- PILLARS (DECORATION) ---
        for(let i=0; i<20; i++) {
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10, 16), wallMat);
            pillar.position.set(i % 2 === 0 ? -9.5 : 9.5, 5, -i * 15);
            scene.add(pillar);
        }

        // --- ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populate() {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=masterpiece&limit=50&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`;
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const h = 4; const w = h * (tex.image.width / tex.image.height);
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.4, h+0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xc5a059, metalness:0.7 }));
                    frame.position.z = -0.11;
                    group.add(frame);
                    const side = i % 2 === 0 ? -9.8 : 9.8;
                    group.position.set(side, 3.5, -i * 12);
                    group.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        populate();

        // --- PHYSICS & CONTROLS ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0;

        window.startExperience = () => {
            document.getElementById('foyer-overlay').classList.add('hidden');
            renderer.domElement.requestPointerLock();
        };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-1.2, Math.min(1.2, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                const t = hits[0].object.parent;
                isFocused = true; document.exitPointerLock();
                document.getElementById('plaque').style.display = 'block';
                document.getElementById('artist').innerText = t.userData.artist;
                document.getElementById('title').innerText = t.userData.title;
                camera.position.set(t.position.x > 0 ? 6 : -6, 2.5, t.position.z);
                camera.lookAt(t.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.15;
                
                let nextPos = camera.position.clone();
                if(keys['KeyW']) nextPos.addScaledVector(dir, speed);
                if(keys['KeyS']) nextPos.addScaledVector(dir, -speed);
                if(keys['KeyA']) nextPos.addScaledVector(side, speed);
                if(keys['KeyD']) nextPos.addScaledVector(side, -speed);

                // COLLISION PHYSICS (Walls & Bounds)
                if(Math.abs(nextPos.x) < 8.5 && nextPos.z < 2) {
                    camera.position.copy(nextPos);
                }

                // FIXED MAP
                const marker = document.getElementById('player-marker');
                marker.style.left = (50 + (camera.position.x * 5)) + "%";
                marker.style.top = (20 - (camera.position.z * 0.2)) + "%";
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
