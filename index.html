<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | MODERNIST PAVILION</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a028; --concrete: #d1d1d1; }
        body { margin: 0; background: #e0e0e0; color: #333; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #top-bar {
            position: absolute; top: 0; width: 100%; height: 65px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.1); box-sizing: border-box;
        }
        .nav-link { color: #444; font-weight: 600; font-size: 11px; margin-right: 25px; cursor: pointer; text-transform: uppercase; border: none; background: none; transition: 0.3s; }
        .nav-link.active { color: var(--gold); }
        #audio-toggle { background: #333; color: #fff; border: none; padding: 6px 18px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        #art-hud { 
            position: absolute; bottom: 40px; right: 40px; width: 340px;
            background: rgba(255, 255, 255, 0.95); color: #222; padding: 30px; border-radius: 0;
            display: none; z-index: 150; box-shadow: 20px 20px 60px rgba(0,0,0,0.1); border: 1px solid #eee;
        }

        #intro { position: absolute; inset: 0; z-index: 200; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="font-family:'Playfair Display'; font-size: 40px; letter-spacing: 2px;">THE GRAND ESTATE</h1>
        <p style="color: #999; letter-spacing: 6px; margin-bottom: 30px; font-size: 12px;">ARCHITECTURAL ART REPOSITORY</p>
        <button onclick="enterGallery()" style="padding:18px 70px; background:#111; color:#fff; border:none; cursor:pointer; font-weight:600; font-size: 12px; letter-spacing: 2px;">ENTER PAVILION</button>
    </div>

    <div id="top-bar">
        <div>
            <button class="nav-link active" onclick="loadContent('renaissance', this)">Renaissance</button>
            <button class="nav-link" onclick="loadContent('impressionism', this)">Impressionism</button>
            <button class="nav-link" onclick="loadContent('abstract', this)">Abstract</button>
            <button id="audio-toggle" onclick="toggleAudio()">AMBIENCE: OFF</button>
        </div>
        <input type="text" id="search-input" placeholder="Search the collection..." style="padding:10px; border:1px solid #ddd; width:240px; font-size: 12px;" onkeypress="if(event.key==='Enter') loadContent(this.value)">
    </div>

    <div id="art-hud">
        <p id="hud-artist" style="text-transform: uppercase; letter-spacing: 2px; font-size: 11px; color: var(--gold); margin-bottom: 10px; font-weight: bold;"></p>
        <h2 id="hud-title" style="margin:0; font-family:'Playfair Display'; font-size: 24px; line-height: 1.2;"></h2>
        <div style="height: 1px; background: #eee; margin: 20px 0;"></div>
        <button onclick="exitFocus()" style="width:100%; padding:12px; background:none; border:1px solid #333; color:#333; cursor:pointer; font-weight:bold; font-size: 10px; letter-spacing: 1px;">CLOSE VIEW</button>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0); // Bright daylight
        scene.fog = new THREE.Fog(0xf0f0f0, 10, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // --- MODERN ARCHITECTURE ---
        // Light Stone Floor
        const floorGeo = new THREE.PlaneGeometry(40, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Concrete Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 12), wallMat);
        leftWall.position.set(-15, 6, -450); leftWall.rotation.y = Math.PI / 2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 12), wallMat);
        rightWall.position.set(15, 6, -450); rightWall.rotation.y = -Math.PI / 2;
        scene.add(rightWall);

        // --- GLOBAL LIGHTING (Daylight) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- ART LOADER ---
        let artPieces = [];
        const loader = new THREE.TextureLoader();

        window.loadContent = async (query, btn) => {
            if(btn) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            }
            artPieces.forEach(a => scene.remove(a));
            artPieces = [];

            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=15&fields=title,artist_display,image_id`);
            const data = await res.json();

            data.data.forEach((item, i) => {
                if(!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 3.5; const w = h * (tex.image.width / tex.image.height);

                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);

                    // Minimalist Thin Black Frame
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.1, h+0.1, 0.05), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                    frame.position.z = -0.03;
                    group.add(frame);

                    const side = i % 2 === 0 ? 1 : -1;
                    group.position.set(14.92 * side, 3.5, -i * 12 - 8);
                    group.rotation.y = (Math.PI / 2) * -side;
                    group.userData = { artist: item.artist_display, title: item.title };

                    scene.add(group);
                    artPieces.push(group);
                });
            });
        };

        // --- INTERACTION ---
        let keys = {}; let isFocused = false;
        let yaw = 0, pitch = 0;
        let targetArt = null;

        window.enterGallery = () => { document.getElementById('intro').style.display = 'none'; loadContent('renaissance'); renderer.domElement.requestPointerLock(); };
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-0.8, Math.min(0.8, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artPieces, true);
            if(hits.length > 0) {
                targetArt = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                document.getElementById('art-hud').style.display = 'block';
                document.getElementById('hud-artist').innerText = targetArt.userData.artist;
                document.getElementById('hud-title').innerText = targetArt.userData.title;
            }
        });

        window.exitFocus = () => { isFocused = false; document.getElementById('art-hud').style.display = 'none'; renderer.domElement.requestPointerLock(); };

        const audio = new Audio('https://www.soundjay.com/ambient/sounds/ambience-museum-1.mp3');
        audio.loop = true;
        window.toggleAudio = () => {
            if(audio.paused) { audio.play(); document.getElementById('audio-toggle').innerText = "AMBIENCE: ON"; }
            else { audio.pause(); document.getElementById('audio-toggle').innerText = "AMBIENCE: OFF"; }
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                if(keys['KeyW']) camera.position.addScaledVector(dir, 0.12);
                if(keys['KeyS']) camera.position.addScaledVector(dir, -0.12);
            } else if(isFocused && targetArt) {
                const offset = targetArt.position.x > 0 ? -4.5 : 4.5;
                const viewPos = new THREE.Vector3(targetArt.position.x + offset, 3.5, targetArt.position.z);
                camera.position.lerp(viewPos, 0.1);
                camera.lookAt(targetArt.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
