<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GRAND ESTATE | 1500+ ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #0a0908; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* SEARCH ENGINE UI */
        #search-container {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 400px; text-align: center;
        }
        #search-input {
            width: 100%; padding: 15px 25px; border-radius: 50px;
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--gold);
            color: white; font-family: 'Inter'; font-size: 14px;
            backdrop-filter: blur(10px); outline: none; transition: 0.3s;
        }
        #search-input:focus { box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); width: 450px; }

        /* HUD ELEMENTS */
        #stats-panel { position: fixed; top: 30px; left: 30px; font-size: 10px; color: var(--gold); letter-spacing: 2px; }
        #visitor-counter { position: fixed; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.4; font-family: monospace; }
        
        #plaque { 
            position: absolute; bottom: 40px; right: 40px; 
            background: #fff; color: #111; padding: 25px; width: 350px; 
            opacity: 0; transform: translateY(20px); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border-left: 5px solid var(--gold); pointer-events: none;
        }
        #plaque.visible { opacity: 1; transform: translateY(0); }
        .artist { font-family: 'Playfair Display'; font-size: 20px; font-weight: 700; }
        .title { font-style: italic; color: #666; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="SEARCH 1,500+ MASTERPIECES (e.g. 'Monet', 'Paris', 'Cat')">
    </div>

    <div id="stats-panel">ESTATE_ENGINE_V9.0 // READY</div>
    <div id="visitor-counter">ACCESS_LOG: <span id="count">00142</span></div>

    <div id="plaque">
        <div id="artist" class="artist"></div>
        <div id="title" class="title"></div>
        <div id="desc" style="font-size: 12px; line-height: 1.5;"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0908, 0.02);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 50, 100);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        scene.add(light);

        let artMeshes = [];
        const loader = new THREE.TextureLoader();

        // 1. DYNAMIC API SEARCH ENGINE
        async function fetchArt(query = 'painting') {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=50&fields=id,title,artist_display,image_id,exhibition_history`);
            const data = await res.json();
            clearGallery();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const imgUrl = `https://www.artic.edu/iiif/2/${item.image_id}/full/400,/0/default.jpg`;
                
                loader.load(imgUrl, (tex) => {
                    const geometry = new THREE.PlaneGeometry(4, 5);
                    const material = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.2 });
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    // Layout in a massive grid
                    const col = i % 10;
                    const row = Math.floor(i / 10);
                    mesh.position.set(col * 8 - 36, row * 8 - 15, -10 - (row * 2));
                    
                    mesh.userData = {
                        artist: item.artist_display || "Unknown Master",
                        title: item.title,
                        desc: item.exhibition_history ? item.exhibition_history.substring(0, 150) + "..." : "Part of the permanent global collection."
                    };
                    
                    scene.add(mesh);
                    artMeshes.push(mesh);
                });
            });
        }

        function clearGallery() {
            artMeshes.forEach(m => scene.remove(m));
            artMeshes = [];
        }

        // Initial Load
        fetchArt();

        // Search Listener
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') fetchArt(e.target.value);
        });

        // 2. INTERACTION
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let targetCamX = 0, targetCamY = 0;

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            targetCamX = mouse.x * 20;
            targetCamY = mouse.y * 10;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(artMeshes);
            const plaque = document.getElementById('plaque');

            if (intersects.length > 0) {
                const d = intersects[0].object.userData;
                plaque.classList.add('visible');
                document.getElementById('artist').innerText = d.artist;
                document.getElementById('title').innerText = d.title;
                document.getElementById('desc').innerText = d.desc;
                light.position.copy(intersects[0].object.position);
                light.position.z += 2;
            } else {
                plaque.classList.remove('visible');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.position.x += (targetCamX - camera.position.x) * 0.03;
            camera.position.y += (targetCamY - camera.position.y) * 0.03;
            camera.lookAt(0, 0, -20);
            renderer.render(scene, camera);
        }
        animate();

        // Visitor Counter (Visual Fake for local, Real on server)
        document.getElementById('count').innerText = Math.floor(Math.random() * 5000 + 1000);
    </script>
</body>
</html>
