<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | ROTUNDA V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --oak: #1c140d; --ivory: #fdfcfb; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        
        /* Navigation & Catalog */
        #top-interface { position: absolute; top: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: auto; }
        #search-input { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); color: #fff; padding: 12px; width: 300px; backdrop-filter: blur(10px); }
        
        #catalog-sidebar { 
            position: absolute; left: -320px; top: 0; width: 300px; height: 100%; 
            background: var(--oak); border-right: 2px solid var(--gold);
            padding: 30px; pointer-events: auto; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;
        }
        #catalog-sidebar.open { left: 0; }
        .art-entry { padding: 15px 0; border-bottom: 1px solid rgba(212,175,55,0.2); cursor: pointer; transition: 0.2s; }
        .art-entry:hover { color: var(--gold); padding-left: 10px; }

        /* Cinematic Plaque */
        #focus-plaque { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: var(--ivory); color: #111; padding: 35px; width: 500px; 
            display: none; border-bottom: 8px solid var(--gold); pointer-events: auto;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); border-radius: 4px;
        }

        #mini-map { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; border: 1px solid var(--gold); background: rgba(0,0,0,0.5); }
        #player-dot { position: absolute; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; transform: translate(-50%, -50%); }

        button { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        button:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-interface">
            <button onclick="document.getElementById('catalog-sidebar').classList.toggle('open')">ARCHIVE CATALOG</button>
            <input type="text" id="search-input" placeholder="SEARCH ESTATE...">
        </div>

        <div id="catalog-sidebar">
            <h1 style="font-family:'Playfair Display'; color:var(--gold); margin-top:0;">ESTATE LIST</h1>
            <div id="list-content"></div>
        </div>

        <div id="mini-map"><div id="player-dot"></div></div>

        <div id="focus-plaque">
            <h2 id="artist" style="margin:0; font-family:'Playfair Display'; font-size: 28px;"></h2>
            <p id="title" style="font-style:italic; color:#666; margin-top:5px;"></p>
            <p style="font-size: 13px; line-height: 1.6; color: #444; margin: 20px 0;">This masterpiece has been verified by the Estate Curator. The lighting has been adjusted to preserve the original pigments of the canvas.</p>
            <button onclick="exitFocus()" style="width:100%;">RETURN TO EXPLORATION [E]</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0705);
        scene.fog = new THREE.Fog(0x0a0705, 1, 50);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- ARCHITECTURE (THE ESTATE) ---
        const amb = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(amb);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c140d, roughness: 0.6, metalness: 0.1 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.02, metalness: 0.9 });

        // Polished Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Vaulted Ceiling
        const ceiling = new THREE.Mesh(new THREE.CylinderGeometry(15, 15, 1000, 32, 1, true, 0, Math.PI), wallMat);
        ceiling.rotation.z = Math.PI / 2;
        ceiling.position.y = 8;
        scene.add(ceiling);

        // Main Art Walls
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 8), wallMat);
        leftWall.position.set(-10, 4, -400); leftWall.rotation.y = Math.PI/2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 8), wallMat);
        rightWall.position.set(10, 4, -400); rightWall.rotation.y = -Math.PI/2;
        scene.add(rightWall);

        // --- ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populate(query = 'renaissance') {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=60&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            artObjects.forEach(a => scene.remove(a));
            artObjects = [];
            document.getElementById('list-content').innerHTML = "";

            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`;
                
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 3.8; const w = h * aspect;

                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex, roughness: 0.3 }));
                    group.add(canvas);

                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.4, h + 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0x000, metalness: 0.8 }));
                    frame.position.z = -0.15;
                    group.add(frame);

                    // Physical Spotlights above each art
                    const light = new THREE.PointLight(0xfff5e6, 8, 10);
                    light.position.set(0, 3, 2);
                    group.add(light);

                    const side = i % 2 === 0 ? -9.8 : 9.8;
                    const zPos = -i * 8;
                    group.position.set(side, 3.2, zPos);
                    group.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
                    
                    group.userData = { artist: item.artist_display, title: item.title, z: zPos };
                    scene.add(group);
                    artObjects.push(group);

                    // Add to Catalog
                    const entry = document.createElement('div');
                    entry.className = "art-entry";
                    entry.innerHTML = `<strong>${item.title}</strong><br><small>${item.artist_display}</small>`;
                    entry.onclick = () => {
                        camera.position.set(side > 0 ? 5 : -5, 1.7, zPos);
                        camera.lookAt(group.position);
                        document.getElementById('catalog-sidebar').classList.remove('open');
                    };
                    document.getElementById('list-content').appendChild(entry);
                });
            });
        }
        populate();

        // --- CONTROLS ---
        let keys = {};
        let isFocused = false;
        let pitch = 0, yaw = 0;

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        renderer.domElement.addEventListener('mousedown', () => {
            if (!isFocused) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0012;
                pitch -= e.movementY * 0.0012;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if (isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if (hits.length > 0) {
                const target = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                document.getElementById('focus-plaque').style.display = 'block';
                document.getElementById('artist').innerText = target.userData.artist;
                document.getElementById('title').innerText = target.userData.title;
                
                // Glide Camera
                const dir = new THREE.Vector3(0,0,3.5).applyQuaternion(target.quaternion);
                camera.position.copy(target.position).add(dir);
                camera.lookAt(target.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('focus-plaque').style.display = 'none';
        };

        function animate() {
            requestAnimationFrame(animate);
            if (!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.15;
                if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
                if (keys['KeyA']) camera.position.addScaledVector(side, speed);
                if (keys['KeyD']) camera.position.addScaledVector(side, -speed);

                // Mini-map update
                const dot = document.getElementById('player-dot');
                dot.style.top = (50 + (camera.position.z * 0.5)) + "%";
                dot.style.left = (50 + (camera.position.x * 2)) + "%";
            }
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') populate(e.target.value);
        });
    </script>
</body>
</html>
