<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | PATRON ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --oak: #2c1e14; --sunset: #ffccaa; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* MONETIZATION HUD */
        #patron-ui {
            position: absolute; top: 30px; right: 30px; z-index: 100;
            background: rgba(44, 30, 20, 0.9); border: 1px solid var(--gold);
            padding: 15px 25px; border-radius: 4px; display: flex; align-items: center; gap: 20px;
        }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        #plaque { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #fffefb; color: #111; padding: 30px; width: 450px; 
            display: none; border-top: 6px solid var(--gold); box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        #foyer-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: linear-gradient(to bottom, #2c1e14, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s ease-in-out; text-align: center;
        }
        #foyer-overlay.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="foyer-overlay">
        <h1 style="font-family:'Playfair Display'; font-size: 60px; color: var(--gold); margin: 0;">THE GRAND ESTATE</h1>
        <p style="letter-spacing: 5px; color: #8a735b; margin-bottom: 30px;">PRIVATE ARCHIVE & COLLECTOR'S WING</p>
        <button onclick="startExperience()" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:15px 40px; cursor:pointer; letter-spacing:3px;">ENTER GALLERY</button>
    </div>

    <div id="patron-ui">
        <div style="font-size: 12px; color: var(--gold); font-weight: 600;">ESTATE PATRONAGE: ACTIVE</div>
        <button class="buy-btn" onclick="alert('Proceeding to Secure Checkout...')">GET FULL DOSSIER</button>
    </div>

    <div id="plaque">
        <h2 id="artist" style="margin:0; font-family:'Playfair Display';"></h2>
        <p id="title" style="font-style:italic; color:#666;"></p>
        <button onclick="exitFocus()" style="width:100%; margin-top:15px; padding:10px; background:#111; color:white; border:none; cursor:pointer;">[E] RETURN TO WALK</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a120b);
        scene.fog = new THREE.Fog(0x1a120b, 5, 50);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- SUNSET LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffe4b5, 0.6));
        const sunset = new THREE.DirectionalLight(0xffaa44, 2.5);
        sunset.position.set(-10, 5, -10);
        scene.add(sunset);

        // --- THE ESTATE (WARM ARCHITECTURE) ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 500), new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.05, metalness: 0.8 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2c1e14, roughness: 0.8 }); // Rich Walnut
        
        // Walls with "Glass" Sections
        for(let i=0; i<10; i++){
            const z = -i * 20;
            // Wall Segment
            const segment = new THREE.Mesh(new THREE.BoxGeometry(0.5, 10, 10), wallMat);
            segment.position.set(-10, 5, z);
            scene.add(segment);

            // Glass Segment (The "Stormy Peaks" Steal)
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0xffccaa, transparent: true, opacity: 0.15 }));
            glass.position.set(-9.9, 5, z - 10);
            glass.rotation.y = Math.PI/2;
            scene.add(glass);
        }

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(500, 10), wallMat);
        rightWall.position.set(10, 5, -250); rightWall.rotation.y = -Math.PI/2;
        scene.add(rightWall);

        // --- ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populate() {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=impressionism&limit=30&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`;
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 4; const w = h * aspect;
                    
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);
                    
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.5, h+0.5, 0.2), new THREE.MeshStandardMaterial({ color: 0xc5a059, metalness: 0.8 }));
                    frame.position.z = -0.15;
                    group.add(frame);

                    group.position.set(9.8, 3.5, -i * 12 - 5);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        populate();

        // --- CONTROLS ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0;

        window.startExperience = () => {
            document.getElementById('foyer-overlay').classList.add('hidden');
            renderer.domElement.requestPointerLock();
        };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0012;
                pitch -= e.movementY * 0.0012;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                const t = hits[0].object.parent;
                isFocused = true; document.exitPointerLock();
                document.getElementById('plaque').style.display = 'block';
                document.getElementById('artist').innerText = t.userData.artist;
                document.getElementById('title').innerText = t.userData.title;
                camera.position.set(6, 2.2, t.position.z);
                camera.lookAt(t.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.15;
                
                let nextPos = camera.position.clone();
                if(keys['KeyW']) nextPos.addScaledVector(dir, speed);
                if(keys['KeyS']) nextPos.addScaledVector(dir, -speed);
                if(keys['KeyA']) nextPos.addScaledVector(side, speed);
                if(keys['KeyD']) nextPos.addScaledVector(side, -speed);

                if(Math.abs(nextPos.x) < 9.2) camera.position.copy(nextPos);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
