<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | ULTRA-UTILITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0c; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* SEARCH & CATEGORY BAR */
        #top-nav {
            position: absolute; top: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 100; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box;
        }
        #search-input { background: #1a1a1a; border: 1px solid var(--gold); color: #fff; padding: 10px; width: 250px; border-radius: 4px; }
        .cat-btn { background: none; border: none; color: #888; cursor: pointer; font-weight: 600; font-size: 12px; margin: 0 10px; text-transform: uppercase; }
        .cat-btn:hover, .cat-btn.active { color: var(--gold); }

        /* MINI-MAP */
        #map { 
            position: absolute; bottom: 30px; left: 30px; width: 150px; height: 150px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--gold); z-index: 100;
        }
        #dot { position: absolute; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; transform: translate(-50%,-50%); }

        /* INSPECTION HUD (Moved to side) */
        #inspection-hud { 
            position: absolute; bottom: 40px; right: 40px; 
            background: #fff; color: #000; padding: 25px; width: 320px; 
            display: none; border-radius: 4px; z-index: 150;
        }

        #foyer { position: absolute; inset: 0; z-index: 200; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s; }
        #foyer.hidden { opacity: 0; pointer-events: none; }
        .paypal-btn { background: var(--gold); color: #000; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="foyer">
        <h1 style="font-family:'Playfair Display'; font-size: 40px; color: var(--gold);">THE GRAND ESTATE</h1>
        <button onclick="enter()" style="padding:15px 40px; background:var(--gold); border:none; cursor:pointer; font-weight:bold;">ENTER GALLERY</button>
        <a href="https://www.paypal.com/ncp/payment/LNBQUTN8VL52U" target="_blank" class="paypal-btn">SUPPORT THE ARCHIVE</a>
    </div>

    <div id="top-nav">
        <div>
            <button class="cat-btn active" onclick="loadArt('masterpiece')">Featured</button>
            <button class="cat-btn" onclick="loadArt('renaissance')">Renaissance</button>
            <button class="cat-btn" onclick="loadArt('modern')">Modern</button>
        </div>
        <input type="text" id="search-input" placeholder="Search the collection..." onkeypress="if(e.key==='Enter') loadArt(this.value)">
    </div>

    <div id="map"><div id="dot"></div></div>

    <div id="inspection-hud">
        <h2 id="h-artist" style="margin:0; font-family:'Playfair Display'; font-size: 20px;"></h2>
        <p id="h-title" style="font-style:italic; color:#666; font-size: 14px;"></p>
        <p style="font-size: 11px; color: #999; margin-top: 10px;">SCROLL TO ZOOM IN/OUT</p>
        <button onclick="exitFocus()" style="width:100%; margin-top:15px; padding:10px; background:#000; color:var(--gold); border:none; cursor:pointer;">[E] RESUME WALK</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 60);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- BRIGHT LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.2)); 
        const light = new THREE.PointLight(0xfff5e6, 20, 30);
        camera.add(light);
        scene.add(camera);

        // --- ENVIRONMENT ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 12), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
        wall.position.set(10, 6, -450); wall.rotation.y = -Math.PI/2;
        scene.add(wall);

        // --- ART SYSTEM ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        window.loadArt = async (query) => {
            artObjects.forEach(obj => scene.remove(obj));
            artObjects = [];
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=25&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 4; const w = h * (tex.image.width / tex.image.height);
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.3, h+0.3, 0.1), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8 }));
                    frame.position.z = -0.06;
                    group.add(frame);
                    
                    group.position.set(9.9, 4, -i * 12 - 10);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        };
        loadArt('masterpiece');

        // --- CONTROLS & ZOOM ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0, zoom = 6;

        window.enter = () => { document.getElementById('foyer').classList.add('hidden'); renderer.domElement.requestPointerLock(); };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('wheel', (e) => {
            if(isFocused) {
                zoom += e.deltaY * 0.01;
                zoom = Math.max(2, Math.min(8, zoom));
            }
        });

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0012;
                pitch -= e.movementY * 0.0012;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        let currentTarget = null;
        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                currentTarget = hits[0].object.parent;
                isFocused = true; zoom = 6;
                document.exitPointerLock();
                document.getElementById('inspection-hud').style.display = 'block';
                document.getElementById('h-artist').innerText = currentTarget.userData.artist;
                document.getElementById('h-title').innerText = currentTarget.userData.title;
            }
        });

        window.exitFocus = () => { isFocused = false; document.getElementById('inspection-hud').style.display = 'none'; renderer.domElement.requestPointerLock(); };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.2;
                if(keys['KeyW']) camera.position.addScaledVector(dir, speed);
                if(keys['KeyS']) camera.position.addScaledVector(dir, -speed);
                if(keys['KeyA']) camera.position.addScaledVector(side, speed);
                if(keys['KeyD']) camera.position.addScaledVector(side, -speed);
                
                // Map update
                const dot = document.getElementById('dot');
                dot.style.left = (50 + (camera.position.x * 4)) + "%";
                dot.style.top = (10 - (camera.position.z * 0.5)) + "%";
            } else if (isFocused && currentTarget) {
                const targetPos = new THREE.Vector3(zoom, 4, currentTarget.position.z);
                camera.position.lerp(targetPos, 0.1);
                camera.lookAt(currentTarget.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
