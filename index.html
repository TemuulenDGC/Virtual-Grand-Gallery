<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND GALLERY | V28.0 REFLECTIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #top-bar {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100; border-bottom: 1px solid #ddd; box-sizing: border-box;
        }
        .nav-link { color: #222; font-weight: 600; font-size: 11px; margin-right: 25px; cursor: pointer; text-transform: uppercase; border: none; background: none; }
        .nav-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        #audio-toggle { background: #000; color: #fff; border: none; padding: 5px 15px; border-radius: 20px; font-size: 10px; cursor: pointer; }

        #art-hud { 
            position: absolute; bottom: 40px; right: 40px; width: 320px;
            background: #fff; color: #000; padding: 25px; border-radius: 12px;
            display: none; z-index: 150; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        #intro { position: absolute; inset: 0; z-index: 200; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="font-family:'Playfair Display'; font-size: 50px; margin: 0;">THE GRAND HALL</h1>
        <p style="color: #888; letter-spacing: 8px; margin-bottom: 40px;">PRIVATE ARCHIVE V28.0</p>
        <button onclick="enterGallery()" style="padding:15px 60px; background:#000; color:#fff; border:none; cursor:pointer; font-weight:bold;">ENTER THE VOID</button>
    </div>

    <div id="top-bar">
        <div>
            <button class="nav-link active" onclick="loadContent('impressionism', this)">Impressionism</button>
            <button class="nav-link" onclick="loadContent('renaissance', this)">Renaissance</button>
            <button class="nav-link" onclick="loadContent('modernism', this)">Modernism</button>
            <button id="audio-toggle" onclick="toggleAudio()">SOUND: OFF</button>
        </div>
        <input type="text" id="search-input" placeholder="Search archives..." style="padding:8px; border:1px solid #ddd; width:220px;" onkeypress="if(event.key==='Enter') loadContent(this.value)">
    </div>

    <div id="art-hud">
        <h2 id="hud-artist" style="margin:0; font-family:'Playfair Display'; font-size: 20px;"></h2>
        <p id="hud-title" style="font-style:italic; color:#777; font-size: 14px; margin-top: 5px;"></p>
        <button onclick="exitFocus()" style="width:100%; margin-top:20px; padding:12px; background:#000; color:#fff; border:none; cursor:pointer; font-weight:bold;">BACK TO GALLERY</button>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- THE REFLECTIVE HALL ---
        // Glossy Floor
        const floorGeo = new THREE.PlaneGeometry(30, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.05, 
            metalness: 0.6 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Ceiling with light strip
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(30, 1000), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
        ceiling.position.y = 10;
        ceiling.rotation.x = Math.PI / 2;
        scene.add(ceiling);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x080808 });
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 15), wallMat);
        leftWall.position.set(-15, 5, -450); leftWall.rotation.y = Math.PI / 2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 15), wallMat);
        rightWall.position.set(15, 5, -450); rightWall.rotation.y = -Math.PI / 2;
        scene.add(rightWall);

        // --- DYNAMIC LIGHTING ---
        const amb = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(amb);

        // --- ART SYSTEM ---
        let artworks = [];
        const loader = new THREE.TextureLoader();

        window.loadContent = async (query, btn) => {
            if(btn) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            }
            artworks.forEach(a => {
                scene.remove(a);
                if(a.light) scene.remove(a.light);
            });
            artworks = [];

            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=16&fields=title,artist_display,image_id`);
            const data = await res.json();

            data.data.forEach((item, i) => {
                if(!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 4; const w = h * aspect;

                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex, emissive: 0xffffff, emissiveIntensity: 0.1 }));
                    group.add(canvas);

                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.2, h+0.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0 }));
                    frame.position.z = -0.06;
                    group.add(frame);

                    const side = i % 2 === 0 ? 1 : -1;
                    group.position.set(14.9 * side, 4, -i * 15 - 10);
                    group.rotation.y = (Math.PI / 2) * -side;
                    group.userData = { artist: item.artist_display, title: item.title };

                    // Local Spotlight
                    const spot = new THREE.SpotLight(0xffffff, 20, 20, 0.4, 0.5);
                    spot.position.set(10 * side, 8, group.position.z);
                    spot.target = group;
                    scene.add(spot);
                    group.light = spot;

                    scene.add(group);
                    artworks.push(group);
                });
            });
        };

        // --- CONTROLS ---
        let keys = {}; let isFocused = false;
        let yaw = 0, pitch = 0;
        let activeArt = null;

        window.enterGallery = () => { document.getElementById('intro').style.display = 'none'; loadContent('masterpiece'); renderer.domElement.requestPointerLock(); };

        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-1, Math.min(1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artworks, true);
            if(hits.length > 0) {
                activeArt = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                document.getElementById('art-hud').style.display = 'block';
                document.getElementById('hud-artist').innerText = activeArt.userData.artist;
                document.getElementById('hud-title').innerText = activeArt.userData.title;
            }
        });

        window.exitFocus = () => { isFocused = false; document.getElementById('art-hud').style.display = 'none'; renderer.domElement.requestPointerLock(); };

        // --- AUDIO ---
        const audio = new Audio('https://www.soundjay.com/ambient/sounds/ambience-museum-1.mp3');
        audio.loop = true;
        window.toggleAudio = () => {
            if(audio.paused) { audio.play(); document.getElementById('audio-toggle').innerText = "SOUND: ON"; }
            else { audio.pause(); document.getElementById('audio-toggle').innerText = "SOUND: OFF"; }
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                if(keys['KeyW']) camera.position.addScaledVector(dir, 0.15);
                if(keys['KeyS']) camera.position.addScaledVector(dir, -0.15);
            } else if(isFocused && activeArt) {
                const offset = activeArt.position.x > 0 ? -4 : 4;
                const target = new THREE.Vector3(activeArt.position.x + offset, 4, activeArt.position.z);
                camera.position.lerp(target, 0.08);
                camera.lookAt(activeArt.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
