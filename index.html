<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | WALKTHROUGH</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #search-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 300px; opacity: 0.8; transition: 0.3s;
        }
        #search-container:hover { opacity: 1; }
        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 5px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold);
            color: white; font-size: 13px; outline: none;
        }

        #plaque { 
            position: absolute; bottom: 40px; left: 40px; 
            background: #fff; color: #111; padding: 25px; width: 320px; 
            display: none; border-left: 5px solid var(--gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100;
        }
        .artist { font-family: 'Playfair Display'; font-size: 18px; font-weight: 700; }
        .title { font-style: italic; color: #666; font-size: 13px; margin-bottom: 8px; }

        #instructions {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 10px; color: var(--gold); letter-spacing: 2px;
            background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid var(--gold);
        }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="SEARCH COLLECTION...">
    </div>

    <div id="plaque">
        <div id="artist" class="artist"></div>
        <div id="title" class="title"></div>
        <div id="desc" style="font-size: 11px; line-height: 1.5;"></div>
        <button onclick="exitFocus()" style="margin-top:15px; cursor:pointer; background:var(--gold); border:none; padding:5px 10px; font-size:10px;">EXIT FOCUS</button>
    </div>

    <div id="instructions">WASD: MOVE | MOUSE: LOOK | CLICK ART: FOCUS</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. SCENE & CAMERA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 1, 45);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 10); // Human height

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. REAL ROOM DESIGN (Marble Floor & Lighting)
        const amb = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(amb);

        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.05, metalness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 3. ART LOADING ENGINE
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function loadGallery(query = 'renaissance') {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=24&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            artObjects.forEach(obj => scene.remove(obj));
            artObjects = [];

            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/600,/0/default.jpg`;
                
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    
                    // Canvas
                    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(4, 5), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(mesh);

                    // Frame
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(4.2, 5.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
                    frame.position.z = -0.15;
                    group.add(frame);

                    // Positioning in a long hall
                    const side = i % 2 === 0 ? -6 : 6;
                    const zPos = -Math.floor(i / 2) * 8;
                    group.position.set(side, 2.5, zPos);
                    group.rotation.y = side > 0 ? -Math.PI/2 : Math.PI/2;
                    
                    group.userData = { artist: item.artist_display, title: item.title, desc: "Permanent Archive Selection." };
                    
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }

        loadGallery();

        // 4. FIRST PERSON NAVIGATION
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0;
        let isFocused = false;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (isFocused) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
        });

        // FOCUS MODE LOGIC
        const raycaster = new THREE.Raycaster();
        window.addEventListener('click', () => {
            if (isFocused) return;
            const mouse = new THREE.Vector2(0, 0); // Center screen
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(scene.children, true);

            if (hits.length > 0) {
                const target = hits[0].object.parent;
                if (target.userData.title) {
                    isFocused = true;
                    showPlaque(target.userData);
                    // Move camera to front of painting
                    const offset = new THREE.Vector3(0, 0, 4).applyQuaternion(target.quaternion);
                    const finalPos = target.position.clone().add(offset);
                    camera.position.copy(finalPos);
                    camera.lookAt(target.position);
                }
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque').style.display = 'none';
        };

        function showPlaque(data) {
            const p = document.getElementById('plaque');
            p.style.display = 'block';
            document.getElementById('artist').innerText = data.artist;
            document.getElementById('title').innerText = data.title;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isFocused) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);

                if (moveForward) camera.position.addScaledVector(dir, 0.1);
                if (moveBackward) camera.position.addScaledVector(dir, -0.1);
                if (moveLeft) camera.position.addScaledVector(side, 0.1);
                if (moveRight) camera.position.addScaledVector(side, -0.1);
            }
            renderer.render(scene, camera);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') loadGallery(e.target.value);
        });

        // Request Pointer Lock for "Real" FPS look
        renderer.domElement.addEventListener('click', () => {
            if(!isFocused) renderer.domElement.requestPointerLock();
        });

        animate();
    </script>
</body>
</html>
