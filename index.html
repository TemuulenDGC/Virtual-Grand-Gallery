<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | V20 FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --oak: #2c1e14; --ivory: #fdfcfb; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #foyer-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: radial-gradient(circle at center, #3d2b1f 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s ease-in-out;
        }
        #foyer-overlay.hidden { opacity: 0; pointer-events: none; }

        .vip-tag { 
            background: var(--gold); color: #000; padding: 5px 15px; 
            font-weight: 900; font-size: 10px; border-radius: 2px; margin-bottom: 10px;
        }

        #plaque-hud { 
            position: absolute; bottom: 40px; right: 40px; 
            background: var(--ivory); color: #111; padding: 25px; width: 350px; 
            display: none; border-left: 8px solid var(--gold); box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="foyer-overlay">
        <div class="vip-tag">PRIVATE ACCESS</div>
        <h1 style="font-family:'Playfair Display'; font-size: 55px; color: var(--gold); margin: 0;">THE GRAND ESTATE</h1>
        <p style="letter-spacing: 5px; color: #8a735b; margin-bottom: 30px;">SECURE ART REPOSITORY</p>
        <button onclick="start()" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:15px 40px; cursor:pointer;">ENTER ARCHIVE</button>
    </div>

    <div id="plaque-hud">
        <h2 id="h-artist" style="margin:0; font-family:'Playfair Display';"></h2>
        <p id="h-title" style="font-style:italic; color:#666;"></p>
        <button onclick="exitFocus()" style="width:100%; margin-top:15px; padding:10px; background:var(--oak); color:var(--gold); border:none; cursor:pointer;">[E] RETURN</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0705);
        scene.fog = new THREE.Fog(0x0a0705, 2, 40);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- WARM LANTERN LIGHT ---
        scene.add(new THREE.AmbientLight(0xffe4b5, 0.4));
        const spot = new THREE.PointLight(0xffaa44, 20, 15);
        camera.add(spot); // Light stays with you
        scene.add(camera);

        // --- WARM ARCHITECTURE ---
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x2c1e14, roughness: 0.7 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.2 });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 10), woodMat);
        wall.position.set(10, 5, -450); wall.rotation.y = -Math.PI/2;
        scene.add(wall);

        // --- HQ ART & LABELS ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populate() {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=renaissance&limit=30&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/1200,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 4; const w = h * (tex.image.width / tex.image.height);
                    
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);
                    
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.4, h+0.4, 0.1), new THREE.MeshStandardMaterial({ color: 0xc5a059, metalness: 0.8 }));
                    frame.position.z = -0.06;
                    group.add(frame);

                    // Physical Wall Label
                    const labelCanvas = document.createElement('canvas');
                    const ctx = labelCanvas.getContext('2d');
                    labelCanvas.width = 400; labelCanvas.height = 100;
                    ctx.fillStyle = "#fdfcfb"; ctx.fillRect(0,0,400,100);
                    ctx.fillStyle = "#000"; ctx.font = "bold 20px Inter";
                    ctx.fillText(item.artist_display.substring(0, 25), 20, 40);
                    ctx.font = "italic 16px Inter";
                    ctx.fillText(item.title.substring(0, 35), 20, 75);
                    const labelTex = new THREE.CanvasTexture(labelCanvas);
                    const label = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.4), new THREE.MeshBasicMaterial({ map: labelTex }));
                    label.position.set(0, -2.8, 0.01);
                    group.add(label);

                    group.position.set(9.9, 4, -i * 14 - 5);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        populate();

        // --- MOVEMENT ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0;

        window.start = () => {
            document.getElementById('foyer-overlay').classList.add('hidden');
            renderer.domElement.requestPointerLock();
        };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0012;
                pitch -= e.movementY * 0.0012;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                const t = hits[0].object.parent;
                isFocused = true; document.exitPointerLock();
                document.getElementById('plaque-hud').style.display = 'block';
                document.getElementById('h-artist').innerText = t.userData.artist;
                document.getElementById('h-title').innerText = t.userData.title;
                camera.position.set(6.5, 3.5, t.position.z);
                camera.lookAt(t.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque-hud').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.15;
                let n = camera.position.clone();
                if(keys['KeyW']) n.addScaledVector(dir, speed);
                if(keys['KeyS']) n.addScaledVector(dir, -speed);
                if(keys['KeyA']) n.addScaledVector(side, speed);
                if(keys['KeyD']) n.addScaledVector(side, -speed);
                if(n.x > 0 && n.x < 9.5) camera.position.copy(n);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
