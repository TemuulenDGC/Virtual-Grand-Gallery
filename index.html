<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | THE LIVING WING</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --ivory: #fdfcfb; --oak: #1a1714; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* UI OVERLAYS */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 1px solid var(--gold); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
        
        #plaque { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--ivory); color: #111; padding: 30px; width: 450px; 
            display: none; border-top: 5px solid var(--gold); pointer-events: auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); border-radius: 2px;
        }

        #search-box { position: absolute; top: 30px; left: 30px; pointer-events: auto; display: flex; gap: 10px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: #fff; padding: 12px; width: 280px; backdrop-filter: blur(10px); outline: none; border-radius: 4px; }
        
        #hud-info { position: absolute; top: 30px; right: 30px; text-align: right; color: var(--gold); font-size: 10px; letter-spacing: 2px; }
        #instructions { position: absolute; bottom: 20px; right: 30px; font-size: 11px; color: var(--gold); opacity: 0.7; }
        
        button { background: var(--oak); color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; cursor: pointer; transition: 0.3s; font-family: 'Inter'; font-weight: 600; }
        button:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="search-box">
            <input type="text" id="search-input" placeholder="SEARCH COLLECTION (e.g. 'Dutch', 'Flowers')">
            <button onclick="location.reload()">RESET HALL</button>
        </div>
        <div id="hud-info">ESTATE ARCHIVE // WING_01<br>TOTAL OBJECTS: <span id="art-count">0</span></div>
        <div id="plaque">
            <h2 id="artist" style="margin:0; font-family:'Playfair Display'; font-size: 24px;"></h2>
            <p id="title" style="font-style:italic; color:#666; font-size: 14px; margin: 10px 0;"></p>
            <p id="desc" style="font-size: 12px; line-height: 1.6; color: #333; margin-bottom: 20px;">Curated from the Global Master Archive. High-resolution scan confirmed.</p>
            <button onclick="exitFocus()" style="width:100%;">[E] BACK TO GALLERY</button>
        </div>
        <div id="instructions">WASD: WALK | MOUSE: LOOK | CLICK: FOCUS | E: UNLOCK</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.Fog(0x0a0a0c, 2, 60);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- THE ARCHITECTURE (THE HALL) ---
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.1, metalness: 0.5 });
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf4f1ea, roughness: 0.9 });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.05 }));
        ceiling.position.y = 6;
        ceiling.rotation.x = Math.PI/2;
        scene.add(ceiling);

        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 6), wallMat);
        leftWall.position.set(-10, 3, -400); leftWall.rotation.y = Math.PI/2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 6), wallMat);
        rightWall.position.set(10, 3, -400); rightWall.rotation.y = -Math.PI/2;
        scene.add(rightWall);

        // Warm Lighting (Sunlight simulation)
        const sun = new THREE.DirectionalLight(0xfff5e6, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // --- ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populateGallery(query = 'painting') {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=50&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            artObjects.forEach(a => scene.remove(a));
            artObjects = [];
            document.getElementById('art-count').innerText = data.data.length;

            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/800,/0/default.jpg`;
                
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 3.5; const w = h * aspect;

                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex, roughness: 0.3 }));
                    group.add(canvas);

                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.3, h + 0.3, 0.15), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5 }));
                    frame.position.z = -0.1;
                    group.add(frame);

                    const side = i % 2 === 0 ? -9.9 : 9.9;
                    group.position.set(side, 2.8, -i * 12); // Spaced out for grandeur
                    group.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
                    
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        populateGallery();

        // --- FLUID CONTROLS ---
        let keys = {};
        let isFocused = false;
        let pitch = 0, yaw = 0;
        let originalCamPos = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        renderer.domElement.addEventListener('click', () => {
            if (!isFocused) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if (isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if (hits.length > 0) {
                const target = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                originalCamPos.copy(camera.position);
                showPlaque(target.userData);
                
                const dir = new THREE.Vector3(0,0,4).applyQuaternion(target.quaternion);
                camera.position.copy(target.position).add(dir);
                camera.lookAt(target.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        function showPlaque(d) {
            document.getElementById('plaque').style.display = 'block';
            document.getElementById('artist').innerText = d.artist;
            document.getElementById('title').innerText = d.title;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);

                const speed = 0.15;
                if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
                if (keys['KeyA']) camera.position.addScaledVector(side, speed);
                if (keys['KeyD']) camera.position.addScaledVector(side, -speed);
            }
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') populateGallery(e.target.value);
        });
    </script>
</body>
</html>
