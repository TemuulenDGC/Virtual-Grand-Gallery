<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | GLASS PAVILION</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a028; }
        body { margin: 0; background: #f8f9fa; color: #1a1a1a; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #top-bar {
            position: absolute; top: 0; width: 100%; height: 70px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(30px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); box-sizing: border-box;
        }
        .nav-link { color: #555; font-weight: 600; font-size: 11px; margin-right: 30px; cursor: pointer; text-transform: uppercase; border: none; background: none; letter-spacing: 1px; }
        .nav-link.active { color: var(--gold); }
        
        #art-hud { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 450px;
            background: #fff; padding: 30px; border-radius: 4px;
            display: none; z-index: 150; box-shadow: 0 40px 100px rgba(0,0,0,0.1); text-align: center;
        }

        #intro { position: absolute; inset: 0; z-index: 200; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="font-family:'Playfair Display'; font-size: 45px; margin: 0;">THE GRAND ESTATE</h1>
        <p style="color: #bbb; letter-spacing: 10px; margin-bottom: 40px; font-size: 10px;">SUMMER EXHIBITION 2026</p>
        <button onclick="enterGallery()" style="padding:20px 80px; background:#000; color:#fff; border:none; cursor:pointer; font-weight:bold; letter-spacing: 2px;">ENTER HALL</button>
    </div>

    <div id="top-bar">
        <div>
            <button class="nav-link active" onclick="loadContent('classical', this)">Classical</button>
            <button class="nav-link" onclick="loadContent('surrealism', this)">Surrealism</button>
            <button class="nav-link" onclick="loadContent('minimalism', this)">Minimalism</button>
        </div>
        <div id="status" style="font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 2px;">Architectural Mode: Glass Pavilion</div>
    </div>

    <div id="art-hud">
        <h2 id="hud-title" style="margin:0; font-family:'Playfair Display'; font-size: 28px;"></h2>
        <p id="hud-artist" style="color: var(--gold); font-weight: 600; font-size: 12px; margin: 10px 0 20px 0; text-transform: uppercase;"></p>
        <button onclick="exitFocus()" style="padding:10px 40px; background:#000; color:#fff; border:none; cursor:pointer; font-size: 10px; font-weight: bold;">RETURN TO WALK</button>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeeff); // Soft sky blue
        scene.fog = new THREE.Fog(0xddeeff, 10, 90);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();

        // --- THE STRUCTURE ---
        // Concrete Floor
        const floorGeo = new THREE.PlaneGeometry(30, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Glass Ceiling & Clouds
        const skyTex = loader.load('https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?q=80&w=1000');
        skyTex.wrapS = skyTex.wrapT = THREE.RepeatWrapping;
        skyTex.repeat.set(1, 10);
        
        const ceiling = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 1000), 
            new THREE.MeshStandardMaterial({ map: skyTex, emissive: 0xffffff, emissiveIntensity: 0.2, transparent: true, opacity: 0.8 })
        );
        ceiling.position.y = 12;
        ceiling.rotation.x = Math.PI / 2;
        scene.add(ceiling);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 12), wallMat);
        leftWall.position.set(-15, 6, -450); leftWall.rotation.y = Math.PI / 2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 12), wallMat);
        rightWall.position.set(15, 6, -450); rightWall.rotation.y = -Math.PI / 2;
        scene.add(rightWall);

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 20, -5);
        scene.add(sun);

        // --- CONTENT ---
        let artworks = [];
        window.loadContent = async (query, btn) => {
            if(btn) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            }
            artworks.forEach(a => scene.remove(a));
            artworks = [];

            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=20&fields=title,artist_display,image_id`);
            const data = await res.json();

            data.data.forEach((item, i) => {
                if(!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 4; const w = h * (tex.image.width / tex.image.height);
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);

                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.1, h+0.1, 0.08), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                    frame.position.z = -0.05;
                    group.add(frame);

                    const side = i % 2 === 0 ? 1 : -1;
                    group.position.set(14.94 * side, 4, -i * 15 - 10);
                    group.rotation.y = (Math.PI / 2) * -side;
                    group.userData = { artist: item.artist_display, title: item.title };

                    scene.add(group);
                    artworks.push(group);
                });
            });
        };

        // --- CONTROLS ---
        let keys = {}; let isFocused = false;
        let yaw = 0, pitch = 0; let activeArt = null;

        window.enterGallery = () => { document.getElementById('intro').style.display = 'none'; loadContent('masterpiece'); renderer.domElement.requestPointerLock(); };
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-0.9, Math.min(0.9, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artworks, true);
            if(hits.length > 0) {
                activeArt = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                document.getElementById('art-hud').style.display = 'block';
                document.getElementById('hud-artist').innerText = activeArt.userData.artist;
                document.getElementById('hud-title').innerText = activeArt.userData.title;
            }
        });

        window.exitFocus = () => { isFocused = false; document.getElementById('art-hud').style.display = 'none'; renderer.domElement.requestPointerLock(); };

        function animate() {
            requestAnimationFrame(animate);
            // Move clouds
            skyTex.offset.y += 0.0005;

            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                if(keys['KeyW']) camera.position.addScaledVector(dir, 0.15);
                if(keys['KeyS']) camera.position.addScaledVector(dir, -0.15);
            } else if(isFocused && activeArt) {
                const offset = activeArt.position.x > 0 ? -5 : 5;
                const viewTarget = new THREE.Vector3(activeArt.position.x + offset, 4, activeArt.position.z);
                camera.position.lerp(viewTarget, 0.1);
                camera.lookAt(activeArt.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
