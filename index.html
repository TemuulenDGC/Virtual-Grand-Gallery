<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | ULTRA-HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0c; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* SEARCH & NAVIGATION */
        #top-nav {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 40px; z-index: 100;
            border-bottom: 1px solid var(--gold); box-sizing: border-box;
        }
        #search-box { background: #111; border: 1px solid #444; color: #fff; padding: 8px 15px; width: 300px; border-radius: 4px; }
        .nav-btn { background: none; border: none; color: #888; cursor: pointer; font-weight: 600; margin-right: 20px; font-size: 12px; }
        .nav-btn.active { color: var(--gold); }

        /* MINI-MAP (Fixed Contrast) */
        #map-container { 
            position: absolute; bottom: 30px; left: 30px; width: 160px; height: 160px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--gold); z-index: 100;
        }
        #user-dot { position: absolute; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }

        /* ART HUD (MOVED TO SIDE) */
        #art-info { 
            position: absolute; bottom: 40px; right: 40px; width: 320px;
            background: #fff; color: #000; padding: 30px; border-radius: 4px;
            display: none; z-index: 150; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #splash { position: absolute; inset: 0; z-index: 200; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #splash.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-family:'Playfair Display'; font-size: 50px; color: var(--gold);">THE GRAND ESTATE</h1>
        <button onclick="startApp()" style="padding:15px 50px; background:var(--gold); border:none; font-weight:900; cursor:pointer;">ENTER THE HALLS</button>
        <p style="color:#444; margin-top:20px; font-size:12px;">ENCRYPTED ACCESS // SECURE CONNECTION</p>
    </div>

    <div id="top-nav">
        <div>
            <button class="nav-btn active" onclick="updateCollection('featured')">FEATURED</button>
            <button class="nav-btn" onclick="updateCollection('renaissance')">RENAISSANCE</button>
            <button class="nav-btn" onclick="updateCollection('modern')">MODERN</button>
        </div>
        <input type="text" id="search-box" placeholder="Search by artist or title..." onkeypress="if(event.key==='Enter') updateCollection(this.value)">
        <a href="https://www.paypal.com/ncp/payment/LNBQUTN8VL52U" target="_blank" style="color:var(--gold); font-size: 12px; font-weight: 800;">DONATE</a>
    </div>

    <div id="map-container"><div id="user-dot"></div></div>

    <div id="art-info">
        <h2 id="art-artist" style="margin:0; font-family:'Playfair Display';"></h2>
        <p id="art-title" style="font-style:italic; color:#666;"></p>
        <p style="font-size: 11px; color: #aaa; margin-top: 15px;">[SCROLL] ZOOM • [E] EXIT VIEW</p>
        <button onclick="closeInspection()" style="width:100%; margin-top:20px; padding:10px; background:#000; color:var(--gold); border:none; font-weight:bold; cursor:pointer;">RETURN TO GALLERY</button>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.Fog(0x0a0a0c, 10, 50);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3; // MAX BRIGHTNESS
        document.body.appendChild(renderer.domElement);

        // --- PRO LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Global base light
        const overhead = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(overhead);

        // --- ARCHITECTURE ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.1, metalness: 0.5 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 20), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        wall.position.set(12, 10, -450); wall.rotation.y = -Math.PI/2;
        scene.add(wall);

        // --- ART SYSTEM ---
        let artPool = [];
        const loader = new THREE.TextureLoader();

        window.updateCollection = async (q) => {
            artPool.forEach(a => scene.remove(a));
            artPool = [];
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${q}&limit=20&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/1200,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 5; const w = h * (tex.image.width / tex.image.height);
                    
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex, emissive: 0xffffff, emissiveIntensity: 0.1 }));
                    group.add(canvas);
                    
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.4, h+0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.1 }));
                    frame.position.z = -0.12;
                    group.add(frame);

                    group.position.set(11.8, 5, -i * 15 - 5);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artPool.push(group);
                });
            });
        };
        updateCollection('featured');

        // --- INTERACTION & ZOOM ---
        let keys = {}; let activeFocus = false;
        let pitch = 0, yaw = 0, currentZoom = 6;
        let selectedArt = null;

        window.startApp = () => { document.getElementById('splash').classList.add('hidden'); renderer.domElement.requestPointerLock(); };

        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'KeyE' && activeFocus) closeInspection();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('wheel', (e) => {
            if(activeFocus) {
                currentZoom += e.deltaY * 0.01;
                currentZoom = Math.max(2, Math.min(8, currentZoom));
            }
        });

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !activeFocus) {
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(activeFocus) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artPool, true);
            if(hits.length > 0) {
                selectedArt = hits[0].object.parent;
                activeFocus = true; currentZoom = 6;
                document.exitPointerLock();
                document.getElementById('art-info').style.display = 'block';
                document.getElementById('art-artist').innerText = selectedArt.userData.artist;
                document.getElementById('art-title').innerText = selectedArt.userData.title;
            }
        });

        window.closeInspection = () => { 
            activeFocus = false; 
            document.getElementById('art-info').style.display = 'none'; 
            renderer.domElement.requestPointerLock(); 
        };

        function loop() {
            requestAnimationFrame(loop);
            if(!activeFocus && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const spd = 0.2;
                if(keys['KeyW']) camera.position.addScaledVector(dir, spd);
                if(keys['KeyS']) camera.position.addScaledVector(dir, -spd);
                if(keys['KeyA']) camera.position.addScaledVector(side, spd);
                if(keys['KeyD']) camera.position.addScaledVector(side, -spd);
                
                // Map Logic
                const dot = document.getElementById('user-dot');
                dot.style.left = (50 + (camera.position.x * 4)) + "%";
                dot.style.top = (10 - (camera.position.z * 0.5)) + "%";
            } else if (activeFocus && selectedArt) {
                const viewPos = new THREE.Vector3(currentZoom, 5, selectedArt.position.z);
                camera.position.lerp(viewPos, 0.15);
                camera.lookAt(selectedArt.position);
            }
            renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
