<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | PENTHOUSE WING</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* LUXURY UI */
        #foyer-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #foyer-overlay.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        #donation-toast {
            position: absolute; top: 30px; right: 30px; z-index: 100;
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--gold);
            padding: 15px 25px; border-radius: 4px; backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 15px;
        }

        .paypal-btn { 
            background: var(--gold); color: #000; text-decoration: none; 
            padding: 8px 15px; font-weight: 800; font-size: 11px; border-radius: 2px;
        }

        #plaque-hud { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 25px; width: 400px; 
            display: none; border-radius: 4px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="foyer-overlay">
        <h1 style="font-family:'Playfair Display'; font-size: 65px; color: var(--gold); margin: 0;">THE GRAND ESTATE</h1>
        <p style="letter-spacing: 8px; color: #666; margin-bottom: 40px;">ULTRA-HD PRIVATE WING</p>
        <button onclick="enter()" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:18px 60px; cursor:pointer; font-weight:600; letter-spacing:2px;">EXPLORE ARCHIVE</button>
    </div>

    <div id="donation-toast">
        <span style="font-size: 12px; color: var(--gold);">SUPPORT THE ARCHIVE</span>
        <a href="https://www.paypal.com/ncp/payment/LNBQUTN8VL52U" target="_blank" class="paypal-btn">DONATE VIA PAYPAL</a>
    </div>

    <div id="plaque-hud">
        <h2 id="h-artist" style="margin:0; font-family:'Playfair Display';"></h2>
        <p id="h-title" style="font-style:italic; color:#555;"></p>
        <button onclick="exitFocus()" style="width:100%; margin-top:15px; padding:12px; background:#000; color:var(--gold); border:none; cursor:pointer; font-weight:bold;">[E] RESUME WALK</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        // Warm Skybox/Background
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.Fog(0x0a0a0c, 10, 60);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- LUXURY LIGHTING ---
        scene.add(new THREE.AmbientLight(0xfff5e6, 0.8));
        const sun = new THREE.DirectionalLight(0xffaa44, 2.0);
        sun.position.set(-15, 10, -10);
        scene.add(sun);

        // --- PENTHOUSE ARCHITECTURE ---
        // Refractive Floor (The Shader look)
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x080808, roughness: 0.05, metalness: 0.9 
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 500), floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Glass Wall (The "Stormy Peaks" Steal)
        const glassMat = new THREE.MeshStandardMaterial({ 
            color: 0x88ccff, transparent: true, opacity: 0.1, metalness: 1, roughness: 0 
        });
        const glassWall = new THREE.Mesh(new THREE.PlaneGeometry(500, 20), glassMat);
        glassWall.position.set(-12, 10, -200); glassWall.rotation.y = Math.PI/2;
        scene.add(glassWall);

        // Concrete/Marble Pillars
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
        for(let i=0; i<20; i++) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(1, 20, 1), pillarMat);
            p.position.set(-11.5, 10, -i * 20);
            scene.add(p);
        }

        const artWall = new THREE.Mesh(new THREE.PlaneGeometry(500, 20), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        artWall.position.set(12, 10, -250); artWall.rotation.y = -Math.PI/2;
        scene.add(artWall);

        // --- HQ ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function loadArt() {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=masterpiece&limit=30&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/1200,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 5; const w = h * (tex.image.width / tex.image.height);
                    
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex, emissive: 0xffffff, emissiveIntensity: 0.1 }));
                    group.add(canvas);
                    
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.4, h+0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1, roughness: 0.2 }));
                    frame.position.z = -0.15;
                    group.add(frame);

                    // Wall Plaque (High Contrast)
                    const pCanv = document.createElement('canvas');
                    const pCtx = pCanv.getContext('2d');
                    pCanv.width = 512; pCanv.height = 128;
                    pCtx.fillStyle = "white"; pCtx.fillRect(0,0,512,128);
                    pCtx.fillStyle = "black"; pCtx.font = "bold 26px Inter";
                    pCtx.fillText(item.artist_display.split(',')[0], 30, 60);
                    pCtx.font = "italic 22px Inter";
                    pCtx.fillText(item.title.substring(0, 40), 30, 100);
                    const pTex = new THREE.CanvasTexture(pCanv);
                    const pMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 0.6), new THREE.MeshBasicMaterial({ map: pTex }));
                    pMesh.position.y = -3.5;
                    group.add(pMesh);

                    group.position.set(11.8, 5, -i * 18 - 10);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        loadArt();

        // --- LOGIC & MOVEMENT ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0;

        window.enter = () => {
            document.getElementById('foyer-overlay').classList.add('hidden');
            renderer.domElement.requestPointerLock();
        };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0012;
                pitch -= e.movementY * 0.0012;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                const t = hits[0].object.parent;
                isFocused = true; document.exitPointerLock();
                document.getElementById('plaque-hud').style.display = 'block';
                document.getElementById('h-artist').innerText = t.userData.artist;
                document.getElementById('h-title').innerText = t.userData.title;
                camera.position.set(6, 5, t.position.z);
                camera.lookAt(t.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque-hud').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.2;
                let n = camera.position.clone();
                if(keys['KeyW']) n.addScaledVector(dir, speed);
                if(keys['KeyS']) n.addScaledVector(dir, -speed);
                if(keys['KeyA']) n.addScaledVector(side, speed);
                if(keys['KeyD']) n.addScaledVector(side, -speed);
                
                // Boundaries (Penthouse floor)
                if(n.x > -10 && n.x < 11) camera.position.copy(n);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
