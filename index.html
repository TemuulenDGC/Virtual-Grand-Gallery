<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | INFINITE HALL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --wall: #f4f1ea; --floor: #111; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* UI OVERLAYS */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid #fff; }
        
        #plaque { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #111; padding: 30px; width: 400px; 
            display: none; border-top: 5px solid var(--gold); pointer-events: auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        #search-box { position: absolute; top: 30px; left: 30px; pointer-events: auto; }
        input { background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: #fff; padding: 10px; width: 250px; outline: none; }

        #instructions { position: absolute; bottom: 20px; right: 30px; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="search-box">
            <input type="text" id="search-input" placeholder="SEARCH ARCHIVE (e.g. Picasso)">
        </div>
        <div id="plaque">
            <h2 id="artist" style="margin:0; font-family:'Playfair Display';"></h2>
            <p id="title" style="font-style:italic; color:#666;"></p>
            <button onclick="exitFocus()" style="background:var(--gold); border:none; padding:10px 20px; cursor:pointer; font-weight:bold; width:100%;">BACK TO GALLERY</button>
        </div>
        <div id="instructions">WASD to Walk | Mouse to Look | Click Art to Inspect</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- THE ROOM (REAL WALLS & FLOOR) ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.05, metalness: 0.9 });

        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 500), floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Ceiling
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(20, 500), wallMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 5;
        scene.add(ceiling);

        // Walls
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(500, 5), wallMat);
        leftWall.position.set(-8, 2.5, -100);
        leftWall.rotation.y = Math.PI / 2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(500, 5), wallMat);
        rightWall.position.set(8, 2.5, -100);
        rightWall.rotation.y = -Math.PI / 2;
        scene.add(rightWall);

        // Lights
        const amb = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(amb);

        // --- ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populateGallery(query = 'painting') {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=30&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            artObjects.forEach(a => scene.remove(a));
            artObjects = [];

            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/600,/0/default.jpg`;
                
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 3; const w = h * aspect;

                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);

                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.2, h + 0.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                    frame.position.z = -0.06;
                    group.add(frame);

                    const side = i % 2 === 0 ? -7.9 : 7.9;
                    group.position.set(side, 2.5, -i * 6);
                    group.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
                    
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        populateGallery();

        // --- MOVEMENT ENGINE (FLUID) ---
        let keys = {};
        let isFocused = false;
        let pitch = 0, yaw = 0;

        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        renderer.domElement.addEventListener('click', () => {
            if (!isFocused) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            }
        });

        // Click Art to Focus
        window.addEventListener('mousedown', () => {
            if (isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if (hits.length > 0) {
                const target = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                showPlaque(target.userData);
                
                // Move Cam
                const dir = new THREE.Vector3(0,0,3.5).applyQuaternion(target.quaternion);
                camera.position.copy(target.position).add(dir);
                camera.lookAt(target.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque').style.display = 'none';
        };

        function showPlaque(d) {
            document.getElementById('plaque').style.display = 'block';
            document.getElementById('artist').innerText = d.artist;
            document.getElementById('title').innerText = d.title;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);

                const speed = 0.12;
                if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
                if (keys['KeyA']) camera.position.addScaledVector(side, speed);
                if (keys['KeyD']) camera.position.addScaledVector(side, -speed);
            }
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') populateGallery(e.target.value);
        });
    </script>
</body>
</html>
