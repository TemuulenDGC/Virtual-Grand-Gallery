<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | LUXURY PENTHOUSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #fff; color: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* OVERLAY UI */
        #top-bar {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100; border-bottom: 1px solid #eee; box-sizing: border-box;
        }
        #search-input { background: #f5f5f5; border: 1px solid #ddd; padding: 8px 15px; width: 250px; border-radius: 4px; }
        .nav-link { color: #666; font-weight: 600; font-size: 11px; margin-right: 25px; cursor: pointer; text-transform: uppercase; border:none; background:none; }
        .nav-link.active { color: var(--gold); }

        /* MINI MAP */
        #mini-map { 
            position: absolute; bottom: 30px; left: 30px; width: 150px; height: 150px; 
            background: #fff; border: 1px solid #ddd; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        #player-marker { position: absolute; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }

        /* ART HUD */
        #art-hud { 
            position: absolute; bottom: 40px; right: 40px; width: 300px;
            background: #fff; color: #000; padding: 25px; border-radius: 8px;
            display: none; z-index: 150; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border: 1px solid #eee;
        }

        #intro { position: absolute; inset: 0; z-index: 200; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro">
        <h1 style="font-family:'Playfair Display'; font-size: 45px; color: #000; margin: 0;">THE GRAND ESTATE</h1>
        <p style="color: #888; letter-spacing: 5px; margin-bottom: 30px;">PRIVATE DIGITAL ARCHIVE</p>
        <button onclick="enterGallery()" style="padding:15px 50px; background:#000; color:#fff; border:none; cursor:pointer; font-weight:bold;">ENTER THE WING</button>
        <a href="https://www.paypal.com/ncp/payment/LNBQUTN8VL52U" target="_blank" style="margin-top: 20px; color: var(--gold); font-size: 12px; font-weight: bold;">DONATE TO ARCHIVE</a>
    </div>

    <div id="top-bar">
        <div>
            <button class="nav-link active" onclick="loadContent('masterpiece')">Featured</button>
            <button class="nav-link" onclick="loadContent('renaissance')">Renaissance</button>
            <button class="nav-link" onclick="loadContent('modern')">Modern Art</button>
        </div>
        <input type="text" id="search-input" placeholder="Search collection..." onkeypress="if(event.key==='Enter') loadContent(this.value)">
    </div>

    <div id="mini-map"><div id="player-marker"></div></div>

    <div id="art-hud">
        <h2 id="hud-artist" style="margin:0; font-family:'Playfair Display'; font-size: 18px;"></h2>
        <p id="hud-title" style="font-style:italic; color:#777; font-size: 14px; margin-top: 5px;"></p>
        <p style="font-size: 10px; color: #aaa; margin-top: 15px;">SCROLL TO ZOOM • [E] TO EXIT</p>
        <button onclick="exitFocus()" style="width:100%; margin-top:15px; padding:10px; background:#f9f9f9; border:1px solid #eee; cursor:pointer;">CLOSE VIEW</button>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f5); // Bright Skybox
        scene.fog = new THREE.Fog(0xf0f0f5, 10, 80);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // --- BRIGHT LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- ARCHITECTURE (THE PENTHOUSE) ---
        // Polished White Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.2 }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Glass Wall Wing
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.1, metalness: 1, roughness: 0 });
        const glass = new THREE.Mesh(new THREE.PlaneGeometry(1000, 20), glassMat);
        glass.position.set(-12, 10, -500); glass.rotation.y = Math.PI/2;
        scene.add(glass);

        // Art Wall
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 20), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        wall.position.set(12, 10, -500); wall.rotation.y = -Math.PI/2;
        scene.add(wall);

        // --- ART SYSTEM ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        window.loadContent = async (q) => {
            artObjects.forEach(obj => scene.remove(obj));
            artObjects = [];
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${q}&limit=20&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                loader.load(`https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`, (tex) => {
                    const group = new THREE.Group();
                    const h = 4.5; const w = h * (tex.image.width / tex.image.height);
                    
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);
                    
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.3, h+0.3, 0.1), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    frame.position.z = -0.06;
                    group.add(frame);

                    group.position.set(11.9, 4.5, -i * 15 - 10);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        };
        loadContent('masterpiece');

        // --- NAVIGATION & ZOOM ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0, zoomDist = 5;
        let activeArt = null;

        window.enterGallery = () => { document.getElementById('intro').style.display = 'none'; renderer.domElement.requestPointerLock(); };

        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'KeyE' && isFocused) exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('wheel', (e) => {
            if(isFocused) {
                zoomDist += e.deltaY * 0.005;
                zoomDist = Math.max(1.5, Math.min(6, zoomDist));
            }
        });

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                activeArt = hits[0].object.parent;
                isFocused = true; zoomDist = 5;
                document.exitPointerLock();
                document.getElementById('art-hud').style.display = 'block';
                document.getElementById('hud-artist').innerText = activeArt.userData.artist;
                document.getElementById('hud-title').innerText = activeArt.userData.title;
            }
        });

        window.exitFocus = () => { isFocused = false; document.getElementById('art-hud').style.display = 'none'; renderer.domElement.requestPointerLock(); };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const spd = 0.15;
                if(keys['KeyW']) camera.position.addScaledVector(dir, spd);
                if(keys['KeyS']) camera.position.addScaledVector(dir, -spd);
                if(keys['KeyA']) camera.position.addScaledVector(side, spd);
                if(keys['KeyD']) camera.position.addScaledVector(side, -spd);
                
                // Map
                const marker = document.getElementById('player-marker');
                marker.style.left = (camera.position.x * 5 + 75) + "px";
                marker.style.top = (-camera.position.z * 0.5 + 75) + "px";
            } else if (isFocused && activeArt) {
                const viewPos = new THREE.Vector3(activeArt.position.x - zoomDist, 4.5, activeArt.position.z);
                camera.position.lerp(viewPos, 0.1);
                camera.lookAt(activeArt.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
