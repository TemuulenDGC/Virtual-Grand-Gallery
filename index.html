<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | ROYAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --ivory: #fdfcfb; --oak: #1a1714; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        
        /* Catalog Sidebar */
        #catalog { 
            position: absolute; right: -350px; top: 0; width: 300px; height: 100%; 
            background: rgba(10, 10, 12, 0.95); border-left: 2px solid var(--gold);
            padding: 20px; pointer-events: auto; transition: 0.5s; overflow-y: auto;
        }
        #catalog.open { right: 0; }
        .catalog-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 12px; }
        .catalog-item:hover { color: var(--gold); }

        /* Plaque UI (Zoom Focus) */
        #plaque { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--ivory); color: #111; padding: 30px; width: 450px; 
            display: none; border-top: 5px solid var(--gold); pointer-events: auto;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        #top-bar { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: auto; }
        input { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: #fff; padding: 12px; width: 250px; outline: none; }
        
        button { background: var(--oak); color: var(--gold); border: 1px solid var(--gold); padding: 10px 15px; cursor: pointer; font-family: 'Inter'; font-weight: 600; }
        button:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <input type="text" id="search-input" placeholder="SEARCH COLLECTION...">
            <button onclick="document.getElementById('catalog').classList.toggle('open')">VIEW ALL ART (LIST)</button>
        </div>

        <div id="catalog">
            <h2 style="font-family:'Playfair Display'; color:var(--gold);">ARCHIVE LIST</h2>
            <div id="list-content"></div>
        </div>

        <div id="plaque">
            <h2 id="artist" style="margin:0; font-family:'Playfair Display';"></h2>
            <p id="title" style="font-style:italic; color:#666;"></p>
            <button onclick="exitFocus()" style="width:100%;">[E] BACK TO GALLERY</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0e0e10);
        scene.fog = new THREE.Fog(0x0e0e10, 5, 45);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- ARCHITECTURE ---
        const amb = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(amb);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf4f1ea, roughness: 0.8 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.05, metalness: 0.8 });
        const trimMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 1000), floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Ceiling with light strips
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(30, 1000), wallMat);
        ceiling.position.y = 6;
        ceiling.rotation.x = Math.PI/2;
        scene.add(ceiling);

        // Moldings (Decorations)
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 6), wallMat);
        leftWall.position.set(-8, 3, -400); leftWall.rotation.y = Math.PI/2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 6), wallMat);
        rightWall.position.set(8, 3, -400); rightWall.rotation.y = -Math.PI/2;
        scene.add(rightWall);

        // --- ART ENGINE ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function populate(query = 'painting') {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${query}&limit=60&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            artObjects.forEach(a => scene.remove(a));
            artObjects = [];
            const list = document.getElementById('list-content');
            list.innerHTML = "";

            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                // REQUESTING HIGH QUALITY (800px width)
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/843,/0/default.jpg`;
                
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 3.5; const w = h * aspect;

                    // The Canvas
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);

                    // Frame
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.3, h + 0.3, 0.2), new THREE.MeshStandardMaterial({ color: 0x111, metalness: 1 }));
                    frame.position.z = -0.11;
                    group.add(frame);

                    // 3D Plaque below painting
                    const pGeo = new THREE.PlaneGeometry(0.8, 0.4);
                    const pMat = new THREE.MeshStandardMaterial({ color: 0xc5a059, metalness: 0.8 });
                    const plaque3d = new THREE.Mesh(pGeo, pMat);
                    plaque3d.position.y = -2.2;
                    group.add(plaque3d);

                    const side = i % 2 === 0 ? -7.85 : 7.85;
                    group.position.set(side, 2.8, -i * 7); // SHORTER DISTANCE BETWEEN ARTS
                    group.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
                    
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);

                    // Add to Catalog List
                    const div = document.createElement('div');
                    div.className = "catalog-item";
                    div.innerHTML = `<b>${item.title}</b><br>${item.artist_display}`;
                    div.onclick = () => {
                        camera.position.set(side > 0 ? 3 : -3, 2.8, group.position.z);
                        camera.lookAt(group.position);
                        document.getElementById('catalog').classList.remove('open');
                    };
                    list.appendChild(div);
                });
            });
        }
        populate();

        // --- FPS CONTROLS ---
        let keys = {};
        let isFocused = false;
        let pitch = 0, yaw = 0;

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        renderer.domElement.addEventListener('mousedown', () => {
            if (!isFocused) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0015;
                pitch -= e.movementY * 0.0015;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if (isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if (hits.length > 0) {
                const target = hits[0].object.parent;
                isFocused = true;
                document.exitPointerLock();
                showPlaque(target.userData);
                
                const dir = new THREE.Vector3(0,0,3.8).applyQuaternion(target.quaternion);
                camera.position.copy(target.position).add(dir);
                camera.lookAt(target.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque').style.display = 'none';
        };

        function showPlaque(d) {
            document.getElementById('plaque').style.display = 'block';
            document.getElementById('artist').innerText = d.artist;
            document.getElementById('title').innerText = d.title;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.15;
                if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
                if (keys['KeyA']) camera.position.addScaledVector(side, speed);
                if (keys['KeyD']) camera.position.addScaledVector(side, -speed);
            }
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') populate(e.target.value);
        });
    </script>
</body>
</html>
