<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GRAND ESTATE | HQ ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b89149; --marble: #fcfcfc; --text: #1a1a1a; }
        body { margin: 0; background: #fff; color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* HQ INTERFACE */
        #foyer-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: #fff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 1.5s ease-in-out;
        }
        #foyer-overlay.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        #plaque-hud { 
            position: absolute; bottom: 40px; right: 40px; 
            background: #fff; padding: 25px; width: 350px; display: none;
            border-bottom: 5px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.1); z-index: 100;
        }

        .patron-badge {
            position: absolute; top: 30px; left: 30px; 
            background: var(--gold); color: #fff; padding: 10px 20px;
            font-size: 10px; letter-spacing: 2px; font-weight: 800; border-radius: 50px;
        }
    </style>
</head>
<body>

    <div id="foyer-overlay">
        <div class="patron-badge">PREMIUM ACCESS</div>
        <h1 style="font-family:'Playfair Display'; font-size: 50px; margin: 0;">THE GRAND ESTATE</h1>
        <p style="letter-spacing: 10px; color: var(--gold); font-size: 12px; margin-bottom: 40px;">PRIVATE HIGH-DEFINITION ARCHIVE</p>
        <button onclick="enter()" style="background:var(--text); color:#fff; border:none; padding:15px 50px; cursor:pointer; font-weight:600;">ENTER EXHIBITION</button>
    </div>

    <div id="plaque-hud">
        <h2 id="h-artist" style="margin:0; font-family:'Playfair Display'; font-size: 22px;"></h2>
        <p id="h-title" style="font-style:italic; color:#666; font-size: 14px;"></p>
        <hr style="border:0; border-top:1px solid #eee; margin: 15px 0;">
        <button onclick="exitFocus()" style="width:100%; padding:10px; background:#f4f4f4; border:1px solid #ddd; cursor:pointer;">[E] RESUME EXPLORATION</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE & HQ LIGHTING ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 5, 45);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // Global Brightness (The "White Cube" aesthetic)
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const skyLight = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 1.0);
        scene.add(skyLight);

        // --- ARCHITECTURE (BRIGHT MARBLE) ---
        const marbleMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.2 });
        
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 1000), marbleMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wall = new THREE.Mesh(new THREE.PlaneGeometry(1000, 15), marbleMat);
        wall.position.set(10, 5, -450); wall.rotation.y = -Math.PI/2;
        scene.add(wall);

        // --- ART ENGINE (WITH HQ DESCRIPTIONS) ---
        let artObjects = [];
        const loader = new THREE.TextureLoader();

        async function loadArchive() {
            const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=modernism&limit=40&fields=id,title,artist_display,image_id`);
            const data = await res.json();
            
            data.data.forEach((item, i) => {
                if (!item.image_id) return;
                const url = `https://www.artic.edu/iiif/2/${item.image_id}/full/1200,/0/default.jpg`; // HQ Image
                
                loader.load(url, (tex) => {
                    const group = new THREE.Group();
                    const aspect = tex.image.width / tex.image.height;
                    const h = 4.5; const w = h * aspect;
                    
                    // Main Canvas
                    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: tex }));
                    group.add(canvas);
                    
                    // Gold Professional Frame
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.3, h+0.3, 0.15), new THREE.MeshStandardMaterial({ color: 0xb89149, metalness: 0.7 }));
                    frame.position.z = -0.1;
                    group.add(frame);

                    // --- WALL DESCRIPTION (IN-WORLD) ---
                    const canvasLabel = document.createElement('canvas');
                    const ctx = canvasLabel.getContext('2d');
                    canvasLabel.width = 512; canvasLabel.height = 128;
                    ctx.fillStyle = "white"; ctx.fillRect(0,0,512,128);
                    ctx.fillStyle = "black"; ctx.font = "bold 24px Inter";
                    ctx.fillText(item.artist_display.substring(0, 30), 20, 50);
                    ctx.font = "italic 20px Inter";
                    ctx.fillText(item.title.substring(0, 40), 20, 90);
                    
                    const labelTex = new THREE.CanvasTexture(canvasLabel);
                    const labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.5), new THREE.MeshBasicMaterial({ map: labelTex }));
                    labelMesh.position.y = -3.2; // Placed under the art
                    group.add(labelMesh);

                    group.position.set(9.85, 4.5, -i * 15 - 10);
                    group.rotation.y = -Math.PI/2;
                    group.userData = { artist: item.artist_display, title: item.title };
                    scene.add(group);
                    artObjects.push(group);
                });
            });
        }
        loadArchive();

        // --- CONTROLS ---
        let keys = {}; let isFocused = false;
        let pitch = 0, yaw = 0;

        window.enter = () => {
            document.getElementById('foyer-overlay').classList.add('hidden');
            renderer.domElement.requestPointerLock();
        };

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE' && isFocused) window.exitFocus();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement === renderer.domElement && !isFocused) {
                yaw -= e.movementX * 0.0012;
                pitch -= e.movementY * 0.0012;
                pitch = Math.max(-1.1, Math.min(1.1, pitch));
            }
        });

        window.addEventListener('mousedown', () => {
            if(isFocused) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(artObjects, true);
            if(hits.length > 0) {
                const t = hits[0].object.parent;
                isFocused = true; document.exitPointerLock();
                document.getElementById('plaque-hud').style.display = 'block';
                document.getElementById('h-artist').innerText = t.userData.artist;
                document.getElementById('h-title').innerText = t.userData.title;
                camera.position.set(6, 4.5, t.position.z);
                camera.lookAt(t.position);
            }
        });

        window.exitFocus = () => {
            isFocused = false;
            document.getElementById('plaque-hud').style.display = 'none';
            renderer.domElement.requestPointerLock();
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!isFocused && document.pointerLockElement === renderer.domElement) {
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.18;
                
                let nextPos = camera.position.clone();
                if(keys['KeyW']) nextPos.addScaledVector(dir, speed);
                if(keys['KeyS']) nextPos.addScaledVector(dir, -speed);
                if(keys['KeyA']) nextPos.addScaledVector(side, speed);
                if(keys['KeyD']) nextPos.addScaledVector(side, -speed);

                if(nextPos.x > 2 && nextPos.x < 9) camera.position.copy(nextPos);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
